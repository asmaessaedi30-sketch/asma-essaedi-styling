{% extends "base.html" %}
{% block title %}Set New Password — Asma Essaedi{% endblock %}

{% block content %}
<main class="auth-page">
  <div class="auth-page__split">
    <section class="auth-panel auth-panel--left">
      <a href="{{ url_for('index') }}" class="auth-panel__logo">Asma Essaedi</a>
      <blockquote class="auth-panel__quote">
        “A good reset flow should feel calm, fast, and trustworthy.”
        <cite>Asma Essaedi</cite>
      </blockquote>
    </section>

    <section class="auth-panel auth-panel--right">
      <div class="auth-form-wrap">
        <h1 class="auth-form__title">Choose a new password</h1>
        <p class="auth-form__sub">Resetting password for {{ email }}</p>

        <form method="post" class="auth-form">
          <div class="form-group">
            <label for="password" class="form-label">New Password</label>
            <input id="password" name="password" type="password" class="form-input" placeholder="At least 8 characters" required />
          </div>

          <div class="form-group">
            <label for="confirm_password" class="form-label">Confirm Password</label>
            <input id="confirm_password" name="confirm_password" type="password" class="form-input" placeholder="Repeat your new password" required />
          </div>

          <button type="submit" class="btn btn--primary btn--full">Save New Password</button>
        </form>

        <p class="auth-form__footer">
          <a href="{{ url_for('login') }}" class="link">Back to log in</a>
        </p>
      </div>
    </section>
  </div>
</main>
{% endblock %}
